# ============================================================
# docker/staging/docker-compose.yml — Staging Compose
# Usage: docker compose -f docker/staging/docker-compose.yml up -d --build
# ============================================================

services:
  staging:
    build:
      context: ../../
      dockerfile: docker/staging/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        DATABASE_URL: ${DATABASE_URL}
    image: frontend-pufa:beta
    container_name: staging-frontend
    restart: always
    environment:
      - NODE_ENV=production
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_BASE_PATH=${NEXTAUTH_BASE_PATH:-/nextauth}
    ports:
      - "127.0.0.1:3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pufa_staging_network

networks:
  pufa_staging_network:
    name: pufa_staging_network
    driver: bridge
