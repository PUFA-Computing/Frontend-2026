# ============================================================
# compose.yaml — Quick Reference / Entrypoint
#
# Pilih file sesuai kebutuhan:
#
# DEVELOPMENT:
#   docker compose -f docker/development/docker-compose.yml up --build
#
# STAGING:
#   docker compose -f docker/staging/docker-compose.yml up -d --build
#
# PRODUCTION:
#   docker compose -f docker/production/docker-compose.yml up -d --build
#
# Pastikan .env sudah ada sebelum menjalankan compose:
#   cp .env.development.sample .env && nano .env
# ============================================================
