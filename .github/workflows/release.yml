name: Release

on:
  push:
    branches:
      - '+([0-9])?(.{+([0-9]),x}).x'
      - master
      - next
      - next-major
      - beta
      - alpha

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance verification
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release

  build_and_push:
    needs: publish
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Get latest github release tag from api
        id: get_latest_release
        run: |
          echo "::set-output name=latest_release::$(curl -s https://api.github.com/repos/PUFA-Computing/Frontend/releases/latest | jq -r '.tag_name')"
      - uses: actions/checkout@v3
      - name: Build the Docker image
        run: |
          docker login -u bagaspra16 -p ${{ secrets.GH_TOKEN }} ghcr.io
          docker build --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} --build-arg NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }} --build-arg NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }} --build-arg DATABASE_URL=${{ secrets.DATABASE_URL }} -t ghcr.io/bagaspra16/pufafrontend:${{ github.sha }} -f docker/production/Dockerfile .
          docker tag ghcr.io/bagaspra16/pufafrontend:${{ github.sha }} ghcr.io/bagaspra16/pufafrontend:${{ steps.get_latest_release.outputs.latest_release }}
          docker push ghcr.io/bagaspra16/pufafrontend:${{ github.sha }}
          docker push ghcr.io/bagaspra16/pufafrontend:${{ steps.get_latest_release.outputs.latest_release }}
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            docker tag ghcr.io/bagaspra16/pufafrontend:${{ github.sha }} ghcr.io/bagaspra16/pufafrontend:latest
            docker push ghcr.io/bagaspra16/pufafrontend:latest
          fi

  deployments:
    runs-on: ubuntu-latest
    needs: build_and_push
    environment: production
    steps:
      - name: Deploy to Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "${{ secrets.GH_TOKEN }}" | docker login ghcr.io -u bagaspra16 --password-stdin
            docker pull ghcr.io/bagaspra16/pufafrontend:latest
            docker stop frontend-pufa || true
            docker rm frontend-pufa || true
            docker run -d \
              --name frontend-pufa \
              --network host \
              --restart always \
              --env-file /var/www/Frontend-2026/.env \
              ghcr.io/bagaspra16/pufafrontend:latest
            docker image prune -f
            echo "✅ Frontend deployed successfully"
